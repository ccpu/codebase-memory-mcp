# Manual Windows artifact build. This builds a zip containing
# codebase-memory-mcp.exe without creating a GitHub release or publishing
# packages.
name: Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: "Optional version string to embed, for example v0.8.0"
        required: false
        type: string
        default: ""
      with_ui:
        description: "Build the embedded UI variant. This runs npm ci."
        required: false
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: windows-exe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884 # v2
        with:
          msystem: CLANG64
          path-type: inherit
          install: >-
            mingw-w64-clang-x86_64-clang
            mingw-w64-clang-x86_64-zlib
            make
            zip

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.with_ui }}
        with:
          node-version: "22"

      - name: Build
        shell: msys2 {0}
        env:
          VERSION: ${{ inputs.version }}
          WITH_UI: ${{ github.event_name != 'workflow_dispatch' || inputs.with_ui }}
        run: |
          set -euo pipefail

          if [ -z "$VERSION" ]; then
            VERSION="0.0.0-dev.${GITHUB_SHA:0:12}"
          fi

          args=(CC=clang CXX=clang++)
          args=(--version "$VERSION" "${args[@]}")
          if [ "$WITH_UI" = "true" ]; then
            args=(--with-ui "${args[@]}")
          fi

          scripts/build.sh "${args[@]}"

      - name: Package artifact
        shell: msys2 {0}
        env:
          WITH_UI: ${{ github.event_name != 'workflow_dispatch' || inputs.with_ui }}
        run: |
          set -euo pipefail

          bin=build/c/codebase-memory-mcp
          [ -f "${bin}.exe" ] && bin="${bin}.exe"
          test -f "$bin"

          cp "$bin" codebase-memory-mcp.exe
          scripts/gen-third-party-notices.sh THIRD_PARTY_NOTICES.md

          name=codebase-memory-mcp-windows-amd64
          if [ "$WITH_UI" = "true" ]; then
            name=codebase-memory-mcp-ui-windows-amd64
          fi

          cat > install.ps1 <<'PS1'
          # install.ps1 - Artifact-local installer for codebase-memory-mcp Windows builds.
          #
          # This installer is generated by .github/workflows/windows-exe.yml. It installs
          # the codebase-memory-mcp.exe located next to this script. It does not download
          # release binaries and does not contact GitHub.
          #
          # Usage:
          #   powershell -ExecutionPolicy Bypass -File .\install.ps1
          #   powershell -ExecutionPolicy Bypass -File .\install.ps1 --configure
          #   powershell -ExecutionPolicy Bypass -File .\install.ps1 --dir=C:\Tools\codebase-memory-mcp
          #   powershell -ExecutionPolicy Bypass -File .\install.ps1 --no-path

          $ErrorActionPreference = "Stop"

          $InstallDir = Join-Path $env:LOCALAPPDATA "Programs\codebase-memory-mcp"
          $BinName = "codebase-memory-mcp.exe"
          $ConfigureAgents = $false
          $NoPath = $false

          foreach ($arg in $args) {
              if ($arg -eq "--configure") { $ConfigureAgents = $true }
              if ($arg -eq "--skip-config") { $ConfigureAgents = $false }
              if ($arg -eq "--no-path") { $NoPath = $true }
              if ($arg -like "--dir=*") { $InstallDir = $arg.Substring(6) }
          }

          $ScriptDir = if ($PSScriptRoot) { $PSScriptRoot } else { (Get-Location).Path }
          $Source = Join-Path $ScriptDir $BinName

          if (-not (Test-Path $Source)) {
              Write-Host "error: $BinName was not found next to install.ps1" -ForegroundColor Red
              Write-Host "Extract the zip first, then run install.ps1 from the extracted folder."
              exit 1
          }

          Write-Host "codebase-memory-mcp artifact installer (Windows)"
          Write-Host "  source: $Source"
          Write-Host "  target: $InstallDir\$BinName"
          Write-Host "  downloads: none"
          Write-Host ""

          $running = Get-Process -Name "codebase-memory-mcp" -ErrorAction SilentlyContinue
          if ($running) {
              Write-Host "Stopping running codebase-memory-mcp process(es)..."
              $running | Stop-Process -Force -ErrorAction SilentlyContinue
          }

          New-Item -ItemType Directory -Path $InstallDir -Force | Out-Null
          $Dest = Join-Path $InstallDir $BinName

          if (Test-Path $Dest) {
              $OldDest = "$Dest.old"
              Remove-Item $OldDest -Force -ErrorAction SilentlyContinue
              Rename-Item $Dest $OldDest -ErrorAction SilentlyContinue
          }

          Copy-Item $Source $Dest -Force

          try {
              $ver = & $Dest --version 2>&1
              Write-Host "Installed: $ver"
          } catch {
              Write-Host "error: installed binary failed to run" -ForegroundColor Red
              exit 1
          }

          if (-not $NoPath) {
              $UserPath = [Environment]::GetEnvironmentVariable("PATH", "User")
              if ($UserPath -notlike "*$InstallDir*") {
                  [Environment]::SetEnvironmentVariable("PATH", "$UserPath;$InstallDir", "User")
                  $env:PATH = "$env:PATH;$InstallDir"
                  Write-Host "Added $InstallDir to user PATH"
              }
          }

          if ($ConfigureAgents) {
              Write-Host ""
              Write-Host "Configuring coding agents..."
              & $Dest install -y 2>&1 | Write-Host
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "error: agent configuration failed (exit code $LASTEXITCODE)" -ForegroundColor Red
                  exit 1
              }
          } else {
              Write-Host ""
              Write-Host "Agent configuration skipped."
              Write-Host "Review first:"
              Write-Host "  `"$Dest`" install --plan"
              Write-Host "  `"$Dest`" install --dry-run"
              Write-Host "Configure later:"
              Write-Host "  `"$Dest`" install"
          }

          Write-Host ""
          Write-Host "Done. Restart your terminal so PATH changes are visible."
          PS1

          cat > index-this-repo.ps1 <<'PS1'
          # index-this-repo.ps1 - Copy this file into a repo root and run it.
          #
          # It indexes the current directory with the installed codebase-memory-mcp
          # binary, stores the cache under .codebase-memory/cache, and deletes
          # this helper script after a successful index.
          #
          # Usage:
          #   powershell -ExecutionPolicy Bypass -File .\index-this-repo.ps1
          #   powershell -ExecutionPolicy Bypass -File .\index-this-repo.ps1 -Mode moderate
          #   powershell -ExecutionPolicy Bypass -File .\index-this-repo.ps1 -Name my-project
          #   powershell -ExecutionPolicy Bypass -File .\index-this-repo.ps1 -KeepScript

          [CmdletBinding()]
          param(
              [string]$Mode = "fast",
              [string]$Name = "",
              [string]$CacheDir = "",
              [switch]$KeepScript
          )

          $ErrorActionPreference = "Stop"

          function Find-CbmExe {
              $cmd = Get-Command codebase-memory-mcp -ErrorAction SilentlyContinue
              if ($cmd) { return $cmd.Source }

              $candidate = Join-Path $env:LOCALAPPDATA "Programs\codebase-memory-mcp\codebase-memory-mcp.exe"
              if (Test-Path $candidate) { return $candidate }

              throw "codebase-memory-mcp.exe was not found. Run install.ps1 from the windows-exe-ui artifact first."
          }

          function Normalize-ProjectName {
              param([string]$Value)
              $n = $Value -replace '[^A-Za-z0-9_.-]', '-'
              $n = $n.Trim('-')
              if (-not $n) { return "repo" }
              return $n
          }

          $RepoPath = (Get-Location).Path
          if (-not $Name) {
              $Name = Normalize-ProjectName (Split-Path -Leaf $RepoPath)
          }
          if (-not $CacheDir) {
              $CacheDir = Join-Path $RepoPath ".codebase-memory\cache"
          }

          New-Item -ItemType Directory -Path $CacheDir -Force | Out-Null

          $env:CBM_INDEX_SUPERVISOR = "0"
          $env:CBM_CACHE_DIR = $CacheDir

          $Exe = Find-CbmExe

          Write-Host "Indexing repository"
          Write-Host "  repo:    $RepoPath"
          Write-Host "  project: $Name"
          Write-Host "  mode:    $Mode"
          Write-Host "  cache:   $CacheDir"
          Write-Host "  exe:     $Exe"
          Write-Host ""

          & $Exe cli index_repository --repo-path $RepoPath --name $Name --mode $Mode
          if ($LASTEXITCODE -ne 0) {
              throw "index_repository failed with exit code $LASTEXITCODE"
          }

          Write-Host ""
          Write-Host "Index status:"
          & $Exe cli index_status --project $Name

          if (-not $KeepScript -and $PSCommandPath) {
              Write-Host ""
              Write-Host "Removing helper script: $PSCommandPath"
              Remove-Item -LiteralPath $PSCommandPath -Force -ErrorAction SilentlyContinue
          }
          PS1

          cat > open-codebase-memory-ui.ps1 <<'PS1'
          # open-codebase-memory-ui.ps1 - Start the local Codebase Memory UI.
          #
          # Run from the repo root. It checks the installed binary, uses the
          # repo-local cache, starts a visible server window, verifies the local
          # HTTP UI, then opens the browser.
          #
          # Usage:
          #   powershell -ExecutionPolicy Bypass -File .\open-codebase-memory-ui.ps1
          #   powershell -ExecutionPolicy Bypass -File .\open-codebase-memory-ui.ps1 -Reindex
          #   powershell -ExecutionPolicy Bypass -File .\open-codebase-memory-ui.ps1 -Port 9750

          [CmdletBinding()]
          param(
              [int]$Port = 9749,
              [string]$Project = "",
              [string]$CacheDir = "",
              [string]$Mode = "fast",
              [switch]$Reindex
          )

          $ErrorActionPreference = "Stop"

          function Find-CbmExe {
              $cmd = Get-Command codebase-memory-mcp -ErrorAction SilentlyContinue
              if ($cmd) { return $cmd.Source }

              $candidate = Join-Path $env:LOCALAPPDATA "Programs\codebase-memory-mcp\codebase-memory-mcp.exe"
              if (Test-Path $candidate) { return $candidate }

              throw "codebase-memory-mcp.exe was not found. Run install.ps1 from the windows-exe-ui artifact first."
          }

          function Normalize-ProjectName {
              param([string]$Value)
              $n = $Value -replace '[^A-Za-z0-9_.-]', '-'
              $n = $n.Trim('-')
              if (-not $n) { return "repo" }
              return $n
          }

          function Test-Ui {
              param([string]$Url)
              try {
                  $r = Invoke-WebRequest -Uri $Url -UseBasicParsing -TimeoutSec 2
                  return ($r.StatusCode -eq 200 -and $r.Content -match "Codebase Memory|<script|<html")
              } catch {
                  return $false
              }
          }

          $RepoPath = (Get-Location).Path
          if (-not $Project) {
              $Project = Normalize-ProjectName (Split-Path -Leaf $RepoPath)
          }
          if (-not $CacheDir) {
              $CacheDir = Join-Path $RepoPath ".codebase-memory\cache"
          }

          New-Item -ItemType Directory -Path $CacheDir -Force | Out-Null

          $env:CBM_INDEX_SUPERVISOR = "0"
          $env:CBM_CACHE_DIR = $CacheDir

          $Exe = Find-CbmExe
          $Url = "http://127.0.0.1:$Port/"

          Write-Host "Checking installed binary..."
          & $Exe --version
          if ($LASTEXITCODE -ne 0) {
              throw "codebase-memory-mcp --version failed"
          }

          if ($Reindex) {
              Write-Host ""
              Write-Host "Reindexing $RepoPath as $Project..."
              & $Exe cli index_repository --repo-path $RepoPath --name $Project --mode $Mode
              if ($LASTEXITCODE -ne 0) {
                  throw "index_repository failed with exit code $LASTEXITCODE"
              }
          } else {
              Write-Host ""
              Write-Host "Checking index status for $Project..."
              & $Exe cli index_status --project $Project
              if ($LASTEXITCODE -ne 0) {
                  Write-Host "No usable index status found. Indexing now..."
                  & $Exe cli index_repository --repo-path $RepoPath --name $Project --mode $Mode
                  if ($LASTEXITCODE -ne 0) {
                      throw "index_repository failed with exit code $LASTEXITCODE"
                  }
              }
          }

          if (-not (Test-Ui $Url)) {
              Write-Host ""
              Write-Host "Starting UI server in a visible PowerShell window..."
              $cmd = "`$env:CBM_INDEX_SUPERVISOR='0'; `$env:CBM_CACHE_DIR='$CacheDir'; & '$Exe' --ui=true --port=$Port"
              Start-Process -FilePath powershell.exe `
                  -ArgumentList @("-NoProfile", "-ExecutionPolicy", "Bypass", "-NoExit", "-Command", $cmd) `
                  -WorkingDirectory $RepoPath `
                  -WindowStyle Normal | Out-Null

              $ready = $false
              for ($i = 0; $i -lt 30; $i++) {
                  Start-Sleep -Seconds 1
                  if (Test-Ui $Url) {
                      $ready = $true
                      break
                  }
              }

              if (-not $ready) {
                  throw "UI did not become ready at $Url. Make sure you installed the windows-exe-ui build, not the standard build."
              }
          }

          Write-Host ""
          Write-Host "UI is ready: $Url"
          Start-Process $Url
          PS1

          zip "${name}.zip" codebase-memory-mcp.exe LICENSE install.ps1 index-this-repo.ps1 open-codebase-memory-ui.ps1 THIRD_PARTY_NOTICES.md

      - name: Windows Defender scan
        shell: pwsh
        run: |
          & "C:\Program Files\Windows Defender\MpCmdRun.exe" -SignatureUpdate 2>$null
          $result = & "C:\Program Files\Windows Defender\MpCmdRun.exe" -Scan -ScanType 3 -File "$PWD\codebase-memory-mcp.exe" -DisableRemediation
          Write-Host $result
          if ($LASTEXITCODE -ne 0) {
            Write-Host "BLOCKED: Windows Defender flagged binary"
            exit 1
          }

      - name: Verify embedded UI
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.with_ui }}
        shell: pwsh
        run: |
          $out = Join-Path $env:RUNNER_TEMP "cbm-ui-out.log"
          $err = Join-Path $env:RUNNER_TEMP "cbm-ui-err.log"
          $process = Start-Process -FilePath "$PWD\codebase-memory-mcp.exe" `
            -ArgumentList @("--ui=true", "--port=9749") `
            -RedirectStandardOutput $out `
            -RedirectStandardError $err `
            -WindowStyle Hidden `
            -PassThru

          try {
            $ok = $false
            for ($i = 0; $i -lt 30; $i++) {
              if ($process.HasExited) {
                break
              }
              try {
                $response = Invoke-WebRequest -Uri "http://127.0.0.1:9749/" -UseBasicParsing -TimeoutSec 2
                if ($response.StatusCode -eq 200 -and $response.Content -match "<html|<div|script") {
                  $ok = $true
                  break
                }
              } catch {
                Start-Sleep -Seconds 1
              }
            }

            if (-not $ok) {
              Write-Host "=== UI stdout ==="
              if (Test-Path $out) { Get-Content $out }
              Write-Host "=== UI stderr ==="
              if (Test-Path $err) { Get-Content $err }
              Write-Host "BLOCKED: built binary did not serve the embedded UI on http://127.0.0.1:9749/"
              exit 1
            }

            Write-Host "Embedded UI verified at http://127.0.0.1:9749/"
          } finally {
            if (-not $process.HasExited) {
              Stop-Process -Id $process.Id -Force
            }
          }

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ (github.event_name != 'workflow_dispatch' || inputs.with_ui) && 'windows-exe-ui' || 'windows-exe-standard' }}
          path: codebase-memory-mcp*-windows-amd64.zip
